<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>الصفحة غير موجودة | WB Studio</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#6b7562" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f7f3ea; --fg:#273126; --muted:#66705f; --cta:#9c7656; --border:rgba(39,49,38,.16); }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; background: var(--bg); color: var(--fg);
      font-family: "IBM Plex Sans Arabic", system-ui, -apple-system, sans-serif;
      line-height: 1.8; text-align: center;
    }
    .wrap { max-width: 560px; }
    .code { font-size: clamp(3rem, 12vw, 6rem); font-weight: 700; letter-spacing: -.02em; margin: 0; }
    h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); margin: .4rem 0 0; }
    p { color: var(--muted); margin: 1rem 0 0; }
    .en { font-size: .95rem; opacity: .85; }
    .btns { margin-top: 2rem; display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-flex; align-items: center; justify-content: center; min-height: 3rem;
      padding: .7rem 1.4rem; border-radius: 999px; text-decoration: none; font-weight: 500;
      border: 1px solid var(--border); color: var(--fg);
    }
    .primary { background: var(--cta); border-color: var(--cta); color: #fffaf2; }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="code">404</p>
    <h1>الصفحة غير موجودة</h1>
    <p>عذراً، الرابط الذي طلبته غير متاح. يمكنك العودة إلى الصفحة الرئيسية لمتابعة تصفح خدمات تصميم الفلل والمنازل الخاصة في جدة والسعودية والخليج.</p>
    <p class="en">The page you’re looking for couldn’t be found.</p>
    <div class="btns">
      <a class="btn primary" href="/">العودة للرئيسية · Home</a>
      <a class="btn" href="/about/">من نحن · About</a>
    </div>
  </main>
</body>
</html>
