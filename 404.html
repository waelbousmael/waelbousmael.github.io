<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>الصفحة غير موجودة | WB Studio</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#faf8f4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#faf8f4; --ink:#1e1c19; --muted:#857f74; --line:rgba(30,28,25,.38); }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; background: var(--bg); color: var(--ink);
      font-family: "IBM Plex Sans Arabic", system-ui, -apple-system, sans-serif;
      line-height: 1.9; text-align: center;
    }
    .wrap { max-width: 560px; }
    .code { font-family: "Amiri", serif; font-size: clamp(3.5rem, 12vw, 6.5rem); font-weight: 400; margin: 0; line-height: 1; color: var(--muted); }
    h1 { font-family: "Amiri", serif; font-weight: 700; font-size: clamp(1.4rem, 4vw, 2rem); margin: 1rem 0 0; }
    p { color: var(--muted); margin: 1rem 0 0; }
    .en { font-size: .92rem; }
    .btns { margin-top: 2.25rem; display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-flex; align-items: center; justify-content: center; min-height: 3rem;
      padding: .75rem 1.6rem; text-decoration: none; font-size: .92rem;
      border: 1px solid var(--ink); color: var(--ink);
      transition: background-color .3s ease, color .3s ease;
    }
    a.btn:hover { background: var(--ink); color: var(--bg); }
    a.primary { background: var(--ink); color: var(--bg); }
    a.primary:hover { background: #4a463f; border-color: #4a463f; }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="/assets/icons/brand-logo.png" alt="WB Studio" width="72" height="72" style="display:block;margin:0 auto 1.5rem;opacity:.9" />
    <p class="code">404</p>
    <h1>الصفحة غير موجودة</h1>
    <p>عذراً، الرابط الذي طلبته غير متاح. يمكنك العودة إلى الصفحة الرئيسية أو تصفح أعمال الاستوديو.</p>
    <p class="en">The page you’re looking for couldn’t be found.</p>
    <div class="btns">
      <a class="btn primary" href="/">الرئيسية · Home</a>
      <a class="btn" href="/work/">الأعمال · Work</a>
      <a class="btn" href="/contact/">تواصل · Contact</a>
    </div>
  </main>
</body>
</html>
